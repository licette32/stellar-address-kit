name: spec-validate

on:
  pull_request:
    paths:
      - "spec/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install ajv
      - run: node spec/validate.js
