name: ci-go

on:
  pull_request:
    paths:
      - "packages/core-go/**"
      - "spec/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - run: cd packages/core-go && go test ./...
